<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dayloom</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Geist:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <div id="auth-screen" class="auth-screen" style="display:none"><!-- rendered by JS --></div>
  <div class="app" id="app" style="display:none">
    <nav class="sidebar" id="sidebar">
      <div class="logo">
        <div class="logo-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
          </svg></div>
        <span class="logo-text">Dayloom</span>
      </div>
      <div class="nav" id="nav"></div>
      <div class="sidebar-footer"><span class="week-pill" id="week-label"></span></div>
      <div class="user-menu" id="user-menu-btn" onclick="toggleUserMenu()">
        <div class="user-avatar" id="user-avatar"></div>
        <div class="user-info">
          <div class="user-name" id="user-name-display"></div>
          <div class="user-handle" id="user-handle-display"></div>
        </div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2">
          <path d="M6 9l6 6 6-6" />
        </svg>
      </div>
    </nav>
    <main class="main" id="main-content-wrap">
      <div id="main-content" style="flex:1;min-width:0;display:flex;flex-direction:column"></div>
      <div class="right-panel" id="right-panel"></div>
    </main>
  </div>
  <div id="modal-root"></div>
  <div id="toast-root"></div>

  <script type="module" src="/main.js"></script>
</body>

</html>
